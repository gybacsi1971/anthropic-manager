# Anthropic Manager — lokális fejlesztői környezet (Traefik nélkül, port-mapping).

services:
  db:
    image: postgres:16-alpine
    container_name: anthropic-manager-dev-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=anthropic_manager
      - POSTGRES_USER=anthropic_manager
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD kotelezo — masold a .env.example-t .env-be}"
      - TZ=Europe/Budapest
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    # Megj.: ha host-oldali psql kell, vegyél fel egy `ports: ["5433:5432"]`
    # blokkot — alapból nincs publikálva (a konténerek belül `db:5432`-t használnak).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthropic_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: anthropic-manager-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TZ=Europe/Budapest
      - "API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY:?Hianyzo API_KEY_ENCRYPTION_KEY — generalas: openssl rand -base64 32 | tr '+/' '-_'}"
      - DATABASE_URL=postgresql://anthropic_manager:${POSTGRES_PASSWORD}@db:5432/anthropic_manager
      - ANTHROPIC_ADMIN_KEY=${ANTHROPIC_ADMIN_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-}
      - ENV_TYPE=${ENV_TYPE:-DEV}
      - ENV_COLOR=${ENV_COLOR:-#FFC107}
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/version')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata_dev:
