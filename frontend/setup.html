<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beállítás — Anthropic Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/vendor/fonts/inter.css">
  <link rel="stylesheet" href="/vendor/fonts/material-icons.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand"><span class="logo">A</span> Anthropic Manager</div>
      <h1>Első beállítás</h1>
      <p class="hint">Hozd létre az első adminisztrátor fiókot</p>
      <form id="setup-form">
        <div class="form-row"><label>Teljes név</label><input type="text" id="name" required autofocus></div>
        <div class="form-row"><label>Email-cím</label><input type="email" id="email" required></div>
        <div class="form-row"><label>Jelszó (min. 12 karakter)</label><input type="password" id="password" required></div>
        <div class="form-row"><label>Jelszó megerősítése</label><input type="password" id="password2" required></div>
        <div id="err" class="error-text"></div>
        <button type="submit" class="btn btn-primary">Fiók létrehozása</button>
      </form>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/setup.js"></script>
</body>
</html>
