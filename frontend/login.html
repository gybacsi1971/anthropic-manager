<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés — Anthropic Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/vendor/fonts/inter.css">
  <link rel="stylesheet" href="/vendor/fonts/material-icons.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand"><span class="logo">A</span> Anthropic Manager</div>
      <h1>Bejelentkezés</h1>
      <p class="hint">Add meg a hozzáférési adataidat a folytatáshoz</p>
      <form id="login-form">
        <div class="form-row"><label>Email-cím</label><input type="email" id="email" required autofocus></div>
        <div class="form-row"><label>Jelszó</label><input type="password" id="password" required></div>
        <div id="err" class="error-text"></div>
        <button type="submit" class="btn btn-primary">Belépés</button>
      </form>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
