<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="page-title" content="Claude Code">
  <title>Claude Code — Anthropic Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/vendor/fonts/inter.css">
  <link rel="stylesheet" href="/vendor/fonts/material-icons.css">
  <script src="/vendor/chart.js/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-header"></header>
      <main class="content">
        <div class="page-head"><div><h1>Claude Code</h1><div class="subtitle">Fejlesztői produktivitás és használat (napi aggregátum, ~1 óra késés)</div></div></div>

        <div class="toolbar">
          <div class="field"><label>Kezdő dátum</label><input type="date" id="start"></div>
          <div class="field"><label>Záró dátum</label><input type="date" id="end"></div>
          <div class="field"><label>Gyors</label><div class="quick-ranges">
            <button class="btn btn-sm" data-days="7">7 nap</button>
            <button class="btn btn-sm" data-days="30">30 nap</button>
            <button class="btn btn-sm" data-days="90">90 nap</button></div></div>
          <div class="field"><label>Idősor metrika</label>
            <select id="metric">
              <option value="sessions" selected>Munkamenetek</option>
              <option value="lines_added">Hozzáadott sorok</option>
              <option value="lines_removed">Törölt sorok</option>
              <option value="commits">Commitok</option>
              <option value="pull_requests">Pull requestek</option>
              <option value="cost">Becsült költség</option>
            </select></div>
          <button class="btn btn-primary" id="apply"><span class="material-icons">refresh</span> Frissítés</button>
        </div>

        <div id="cc-empty" style="display:none"></div>

        <div class="grid cols-4" id="kpis"></div>

        <div class="grid cols-2 mt-24">
          <div class="card"><div class="card-head"><h2 id="ts-title">Idősor</h2></div>
            <div class="card-body"><div class="chart-box"><canvas id="ts-chart"></canvas></div></div></div>
          <div class="card"><div class="card-head"><h2>Eszköz-elfogadási arányok</h2></div>
            <div class="card-body"><div class="table-wrap"><table class="data" id="acc-table"></table></div></div></div>
        </div>

        <div class="card mt-24"><div class="card-head"><h2>Fejlesztői rangsor</h2></div>
          <div class="card-body"><div class="table-wrap"><table class="data" id="lb-table"></table></div></div></div>
      </main>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app-shell.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/claude-code.js"></script>
</body>
</html>
