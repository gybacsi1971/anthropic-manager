<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="page-title" content="Használat">
  <title>Használat — Anthropic Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/vendor/fonts/inter.css">
  <link rel="stylesheet" href="/vendor/fonts/material-icons.css">
  <script src="/vendor/chart.js/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="app-sidebar"></aside>
    <div class="main">
      <header class="topbar" id="app-header"></header>
      <main class="content">
        <div class="page-head"><div><h1>Használat</h1><div class="subtitle">Token-felhasználás bontásban — a mai nap részleges, óránként frissül</div></div></div>

        <div class="toolbar">
          <div class="field"><label>Kezdő dátum</label><input type="date" id="start"></div>
          <div class="field"><label>Záró dátum</label><input type="date" id="end"></div>
          <div class="field"><label>Gyors</label><div class="quick-ranges">
            <button class="btn btn-sm" data-days="7">7 nap</button>
            <button class="btn btn-sm" data-days="30">30 nap</button>
            <button class="btn btn-sm" data-days="90">90 nap</button></div></div>
          <div class="field"><label>Csoportosítás</label>
            <select id="group_by">
              <option value="model" selected>Modell</option>
              <option value="workspace_id">Workspace</option>
              <option value="api_key_id">API kulcs</option>
              <option value="service_tier">Service tier</option>
              <option value="context_window">Context window</option>
              <option value="none">Nincs (összes)</option>
            </select></div>
          <div class="field"><label>Metrika</label>
            <select id="metric">
              <option value="total_tokens" selected>Összes token</option>
              <option value="input">Bemeneti token</option>
              <option value="output">Kimeneti token</option>
              <option value="cache_read">Cache olvasás</option>
              <option value="cache_creation">Cache létrehozás</option>
              <option value="web_search">Web keresés</option>
            </select></div>
          <button class="btn btn-primary" id="apply"><span class="material-icons">refresh</span> Frissítés</button>
        </div>

        <div class="grid cols-4" id="kpis"></div>

        <div class="card mt-24"><div class="card-head"><h2 id="ts-title">Idősor</h2></div>
          <div class="card-body"><div class="chart-box"><canvas id="ts-chart"></canvas></div><div class="legend" id="ts-legend"></div></div></div>

        <div class="grid cols-2 mt-24">
          <div class="card"><div class="card-head"><h2>Megoszlás</h2></div>
            <div class="card-body"><div class="chart-box small"><canvas id="bd-doughnut"></canvas></div><div class="legend" id="bd-legend"></div></div></div>
          <div class="card"><div class="card-head"><h2>Részletek</h2></div>
            <div class="card-body"><div class="table-wrap"><table class="data" id="bd-table"></table></div></div></div>
        </div>

        <div class="card mt-24"><div class="card-head"><h2>Cache token bontás modellenként</h2><span class="muted" style="font-size:12px">találati arány = cache olvasás / (cache olvasás + uncached input)</span></div>
          <div class="card-body"><div class="table-wrap"><table class="data" id="cache-table"></table></div></div></div>
      </main>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/app-shell.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/usage.js"></script>
</body>
</html>
